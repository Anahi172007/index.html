<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro de Servicios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="bg-success text-white py-4 text-center">
        <h1>Sistema de Registro de Servicios</h1>
        <p class="mb-0">Proyecto Integrador - Desarrollo Web</p>
    </header>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="#">Servicios</a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#formServicio">Registrar</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#listaServicios">Servicios</a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <main class="container my-5">

        <div class="row">

            <!-- FORMULARIO -->

            <div class="col-lg-5">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">
                        Registrar Servicio
                    </div>

                    <div class="card-body">

                        <form id="formServicio">

                            <div class="mb-3">

                                <label class="form-label">
                                    Nombre del Servicio
                                </label>

                                <input
                                    type="text"
                                    id="nombre"
                                    class="form-control">

                                <div id="errorNombre" class="invalid-feedback"></div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Descripción
                                </label>

                                <textarea
                                    id="descripcion"
                                    class="form-control"></textarea>

                                <div id="errorDescripcion" class="invalid-feedback"></div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Categoría
                                </label>

                                <select
                                    id="categoria"
                                    class="form-select">

                                    <option value="">Seleccione</option>

                                    <option>Tecnología</option>

                                    <option>Educación</option>

                                    <option>Salud</option>

                                    <option>Transporte</option>

                                </select>

                                <div id="errorCategoria" class="invalid-feedback"></div>

                            </div>

                            <button class="btn btn-success w-100">

                                Registrar Servicio

                            </button>

                        </form>

                    </div>

                </div>

            </div>

            <!-- PANEL DERECHO -->

            <div class="col-lg-7">

                <!-- ALERTA -->

                <div
                    id="mensaje"
                    class="alert alert-success d-none">

                </div>

                <!-- SPINNER -->

                <div
                    id="spinner"
                    class="text-center d-none my-3">

                    <div
                        class="spinner-border text-success"
                        role="status">

                    </div>

                    <p>Cargando información...</p>

                </div>

                <!-- TOTAL -->

                <div class="card shadow">

                    <div class="card-body">

                        <h4>

                            Total de registros:

                            <span
                                id="total"
                                class="badge bg-success">

                                0

                            </span>

                        </h4>

                    </div>

                </div>

                <!-- LISTA -->

                <div
                    id="listaServicios"
                    class="row mt-4">

                </div>

            </div>

        </div>

    </main>

    <!-- MODAL -->

    <div
        class="modal fade"
        id="modalInfo"
        tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header bg-success text-white">

                    <h5 class="modal-title">

                        Información

                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div
                    class="modal-body"
                    id="contenidoModal">

                    Aquí aparecerá la información del servicio.

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cerrar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
